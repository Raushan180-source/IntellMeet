<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>IntellMeet | AI-Powered Meeting Platform</title>

    <!-- SEO -->
    <meta
      name="description"
      content="IntellMeet is an AI-powered enterprise meeting and collaboration platform with real-time video, smart summaries, and task management."
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Fonts (Professional SaaS look) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:title" content="IntellMeet" />
    <meta property="og:description" content="AI-powered meeting platform with real-time collaboration and smart summaries." />
    <meta property="og:type" content="website" />

  </head>

  <body class="bg-gray-50 text-gray-900">
    
    <!-- Root App -->
    <div id="root"></div>

    <!-- Loading Fallback (UX improvement) -->
    <div id="loading" style="text-align:center; margin-top: 20%;">
      <p style="font-family: Inter, sans-serif; font-size: 18px; color: #555;">
        Loading IntellMeet...
      </p>
    </div>

    <!-- Main Script -->
    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
